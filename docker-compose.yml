services:
  frontend:
    build:
      context: .
      dockerfile: dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./front/src
          target: /app/src
          ignore:
            - .front/node_modules/
        - action: rebuild
          path: ./front/package.json

  backend:
    build:
      context: .
      dockerfile: dockerfile.backend
    develop:
      watch:
        - action: sync
          path: ./back/src
          target: /app/src
          ignore:
            - .back/node_modules/
        - action: sync
          path: ./back/__tests__
          target: /app/__tests__
        - action: sync
          path: ./back/prisma
          target: /app/prisma
        - action: rebuild
          path: ./back/package.json
        - action: rebuild
          path: ./back/entrypoint.sh
    ports:
      - "4000:4000"
      - "4001:4001"
      - "5555:5555"
      - "9229:9229"
      
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      NODE_ENV: development
      POSTGRES_USER_FILE: /run/secrets/postgres_user 
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    depends_on:
      - db
    

  db:
    image: postgres:17
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
secrets:
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  postgres_db:
    file: ./secrets/postgres_db.txt

volumes:
  postgres-data:
  backend-logs: